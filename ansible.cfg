[defaults]
inventory = inventory/hosts
host_key_checking = False
timeout = 30
retry_files_enabled = False
gathering = explicit

[privilege_escalation]
become = True
become_method = enable

[ssh_connection]

ssh_args = -o KexAlgorithms=+diffie-hellman-group1-sha1,diffie-hellman-group14-sha1 -o HostkeyAlgorithms=+ssh-dss,ssh-rsa
